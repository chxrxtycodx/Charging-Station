<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Battery Hub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<style>
body{margin:0;font-family:system-ui;background:linear-gradient(#8fb0e8,#6d8ac7)}
header,#status{backdrop-filter:blur(10px);text-align:center}
header{padding:16px;font-size:22px;background:#fff9;position:relative}
#status{padding:8px;font-size:14px;background:#fff6}
#devices{padding:20px;max-width:900px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.device{background:#fff9;padding:16px;border-radius:16px}
.battery-bar{height:10px;background:#ddd;border-radius:6px;overflow:hidden}
.battery-fill{height:100%;transition:.3s}
#chart-container{max-width:700px;margin:20px auto;background:#fff9;padding:20px;border-radius:16px}
#settings-btn{position:absolute;right:16px;top:12px;font-size:22px;background:none;border:none;cursor:pointer}
#settings{
  position:fixed;
  left:0;
  right:0;
  bottom:-300px;
  background:#fff;
  padding:20px;
  border-radius:20px 20px 0 0;
  box-shadow:0 -4px 20px rgba(0,0,0,.15);
  transition:bottom .3s ease;
}
#settings.open{bottom:0}
</style>
</head>

<body>

<header>
My Hub
<button id="settings-btn" onclick="toggleSettings()">⚙</button>
</header>

<div id="status">Connecting…</div>
<div id="devices"></div>

<div id="chart-container">
<canvas id="chart"></canvas>
</div>

<div id="settings">
<select id="rate">
<option value="10000">10s</option>
<option value="300000">5m</option>
<option value="900000">15m</option>
</select>
<button onclick="applySettings()">Apply</button>
<button onclick="closeSettings()">Close</button>
</div>

<script>
const BROKER="10.143.170.254", PORT=9001, TOPIC="OSOROC/devices/battery/#";

let devices={}, chart, timer, interval=10000, client;

const $=id=>document.getElementById(id);
const status=t=>$("status").textContent=t;

function toggleSettings(){
  $("settings").classList.toggle("open");
}

function closeSettings(){
  $("settings").classList.remove("open");
}

function applySettings(){
  interval=+$("rate").value;
  clearInterval(timer);
  timer=setInterval(renderChart,interval);
  closeSettings();
}

function connect(){
  if(client) try{client.disconnect()}catch{}
  client=new Paho.MQTT.Client(BROKER,PORT,"/mqtt","bh_"+Math.random());
  
  client.onConnectionLost=()=>{status("Reconnecting…");setTimeout(connect,3000)};
  client.onMessageArrived=m=>{
    try{
      const d=JSON.parse(m.payloadString);
      const name=d.device || d.device_name;
      if(name && d.percent!=null) update({...d,device:name});
    }catch{}
  };

  status("Connecting…");
  client.connect({
    onSuccess:()=>{status("Connected");client.subscribe(TOPIC)},
    onFailure:()=>{status("Retrying…");setTimeout(connect,3000)}
  });
}

function update(d){
  const dev=devices[d.device] ||= {name:d.device,hist:[],time:[]};
  Object.assign(dev,{percent:Number(d.percent),plugged:d.plugged,last:new Date()});

  dev.hist.push(Number(d.percent));
  dev.time.push(new Date());
  if(dev.hist.length>40){dev.hist.shift();dev.time.shift()}

  renderDevices();
  renderChart();
}

const color=p=>p>=70?"#34c759":p>=30?"#ff9500":"#ff3b30";

function renderDevices(){
  $("devices").innerHTML=Object.values(devices).length
  ? Object.values(devices).map(d=>`
    <div class="device">
      <b>${d.name}</b><br>
      <span style="font-size:28px;color:${color(d.percent)}">${d.percent}%</span>
      <div class="battery-bar">
        <div class="battery-fill" style="width:${d.percent}%;background:${color(d.percent)}"></div>
      </div>
      <small>${d.plugged?"⚡ Charging":"Battery"} | ${d.last?.toLocaleTimeString()||""}</small>
    </div>
  `).join("")
  : `<div style="text-align:center">Waiting for devices…</div>`;
}

function renderChart(){
  const data=Object.values(devices).map((d,i)=>({
    label:d.name,
    data:d.hist.map((v,i)=>({x:d.time[i],y:v})),
    borderColor:["#3a7bd5","#34c759","#ff9500","#a855f7"][i%4],
    tension:.3
  }));

  if(!chart){
    chart=new Chart($("chart"),{
      type:"line",
      data:{datasets:data},
      options:{animation:false,scales:{y:{min:0,max:100}}}
    });
  }else{
    chart.data.datasets=data;
    chart.update();
  }
}

timer=setInterval(renderChart,interval);
connect();
</script>

</body>
</html>
